<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Build Dashboard — SEDX, LLC</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<style>
  :root {
    --bg: #0A0A0A;
    --bg-card: #14130F;
    --bg-row-hover: #1A1814;
    --border: #2A2620;
    --text: #E8DCC0;
    --text-dim: #9C9079;
    --gold: #C9A24A;
    --gold-hover: #E0B45A;
    --muted: #5A5448;
    --danger: #C44;
    --beta: #6B8FB5;
    --alpha: #9B7BB5;
    --internal: #9C9079;
    --ok: #6FA86F;
    --ios: #5B9BD5;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }
  .wrap { max-width: 1280px; margin: 0 auto; padding: 40px 24px 96px; }
  .crumb { display: inline-block; color: var(--text-dim); font-size: 13px; text-decoration: none; margin-bottom: 24px; }
  .crumb:hover { color: var(--gold); }

  .head { display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 8px; }
  h1 { font-size: 26px; margin: 0; font-weight: 600; letter-spacing: -0.3px; }
  .meta { color: var(--text-dim); font-size: 13px; }
  .btns { display: flex; gap: 8px; }
  .btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    font-size: 13px; padding: 6px 14px; border-radius: 8px; cursor: pointer;
  }
  .btn:hover { border-color: var(--gold); color: var(--gold); }
  .btn:disabled { opacity: 0.5; cursor: progress; }

  .chips { display: flex; gap: 10px; flex-wrap: wrap; margin: 18px 0 26px; }
  .chip {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 14px; font-size: 13px; color: var(--text-dim);
  }
  .chip b { color: var(--text); font-weight: 600; }

  /* charts */
  .charts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 8px 0 26px; }
  @media (max-width: 880px) { .charts { grid-template-columns: 1fr; } }
  .chartcard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px 16px 12px; }
  .chartcard h3 { margin: 0; font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-dim); font-weight: 600; }
  .chartcard .big { font-size: 23px; font-weight: 600; color: var(--text); margin: 3px 0 10px; letter-spacing: -0.3px; font-variant-numeric: tabular-nums; }
  .chartcard .big .unit { font-size: 12px; color: var(--text-dim); font-weight: 500; margin-left: 5px; }
  .chartcard svg { width: 100%; height: 96px; display: block; }
  .chartcard .xr { display: flex; justify-content: space-between; font-size: 10px; color: var(--muted); margin-top: 6px; font-variant-numeric: tabular-nums; }
  .legend { display: flex; gap: 14px; margin-top: 9px; font-size: 11px; color: var(--text-dim); }
  .legend .k { display: inline-flex; align-items: center; gap: 5px; }
  .legend .sw { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }

  .tablewrap {
    border: 1px solid var(--border); border-radius: 12px; overflow-x: auto;
    background: var(--bg-card);
  }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  thead th {
    position: sticky; top: 0; background: var(--bg-card);
    text-align: left; font-weight: 600; color: var(--text-dim);
    font-size: 11px; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 12px 12px; border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  thead th.num { text-align: right; }
  thead th.trk { text-align: center; }
  tbody td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--bg-row-hover); }
  tbody tr.off td { opacity: 0.5; }

  .app-name { font-size: 14px; font-weight: 600; color: var(--text); }
  .app-id { font-size: 10.5px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }

  .dev b { color: var(--gold); font-weight: 600; }

  /* per-track release cell */
  td.trk { text-align: center; white-space: nowrap; }
  .tver { color: var(--text); font-weight: 500; }
  .tvc { color: var(--text-dim); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
  td.trk.production .tver { color: var(--gold); }
  td.trk.beta .tver       { color: var(--beta); }
  td.trk.alpha .tver      { color: var(--alpha); }
  td.trk.appstore .tver   { color: var(--ios); }
  td.dash { color: var(--muted); text-align: center; }
  .tstatus { display: block; font-size: 10px; color: var(--muted); margin-top: 1px; }
  .tstatus.rollout { color: var(--beta); }
  .tstatus.halted { color: var(--danger); }
  .ahead { display: block; color: var(--ok); font-size: 10px; margin-top: 1px; }

  td.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
  td.num.zero { color: var(--muted); }

  .stores { display: flex; gap: 6px; }
  .store {
    font-size: 11px; color: var(--text-dim); text-decoration: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px; white-space: nowrap;
  }
  .store:hover { color: var(--gold); border-color: var(--gold); }

  .cell-note { color: var(--muted); font-style: italic; font-size: 12px; }
  .cell-err { color: var(--danger); font-size: 12px; }
  .empty { color: var(--text-dim); text-align: center; padding: 60px 0; }
</style>
</head>
<body>
<div class="wrap">
  <a class="crumb" href="/scratchpad/">&larr; Internal</a>
  <div class="head">
    <h1>Build Dashboard</h1>
    <div class="btns">
      <button class="btn" id="refresh" title="Re-read the latest stored snapshot">Refresh</button>
      <button class="btn" id="rebuild" title="Re-query Play + App Store now, then reload (takes ~30s)">Force rebuild</button>
    </div>
  </div>
  <div class="meta" id="snapshot">Loading…</div>
  <div class="chips" id="chips"></div>
  <div class="charts" id="charts"></div>
  <div class="tablewrap">
    <table>
      <thead>
        <tr>
          <th>App</th>
          <th class="num">Dev</th>
          <th class="trk">Internal</th>
          <th class="trk">Alpha</th>
          <th class="trk">Beta</th>
          <th class="trk">Production</th>
          <th class="trk">App Store</th>
          <th class="num">Installs</th>
          <th class="num">Rev 30d</th>
          <th>Links</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
</div>

<script>
// Pipeline order, left → right (internal is earliest, production is last).
const TRACK_ORDER = ['internal', 'alpha', 'beta', 'production'];
const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function fmtAgo(iso) {
  if (!iso) return 'never';
  const d = new Date(iso), now = new Date();
  const mins = Math.round((now - d) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + ' min ago';
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return hrs + ' hr ago';
  return Math.round(hrs / 24) + ' day(s) ago';
}

// One <td> for a single Play track.
function trackCell(track, t, devVersion) {
  if (!t) return `<td class="dash">—</td>`;
  const vc = (t.versionCodes || []).join(', ');
  const ahead = devVersion && t.name && devVersion !== t.name && track === 'production';
  let status = '';
  if (t.status === 'inProgress') {
    const pct = t.userFraction != null ? Math.round(t.userFraction * 100) + '%' : 'rolling out';
    status = `<span class="tstatus rollout">${pct}</span>`;
  } else if (t.status === 'halted') {
    status = `<span class="tstatus halted">halted</span>`;
  } else if (t.status === 'draft') {
    status = `<span class="tstatus">draft</span>`;
  }
  return `<td class="trk ${track}">
    <span class="tver">${esc(t.name || '—')}</span>
    ${vc ? `<span class="tvc"> (${esc(vc)})</span>` : ''}
    ${ahead ? '<span class="ahead">dev ahead</span>' : ''}
    ${status}
  </td>`;
}

function num(v, suffix = '') {
  if (v == null) return `<td class="num dash">—</td>`;
  const zero = v === 0 ? ' zero' : '';
  return `<td class="num${zero}">${suffix}${v.toLocaleString()}</td>`;
}

// Money cell with cents (revenue) — dims zero, dash for missing.
function money2(v) {
  if (v == null) return `<td class="num dash">—</td>`;
  const zero = v === 0 ? ' zero' : '';
  return `<td class="num${zero}">$${v.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</td>`;
}

// One <td> for the live App Store (iOS production) version. Independent of the
// Play track columns — an app can be on the App Store but errored/absent on Play.
function iosCell(app) {
  const v = app.iosVersion;
  if (!v) return `<td class="trk dash">—</td>`;
  const ahead = app.version && v !== app.version;
  return `<td class="trk appstore">
    <span class="tver">${esc(v)}</span>
    ${ahead ? '<span class="ahead">dev ahead</span>' : ''}
  </td>`;
}

function storeCell(app) {
  const links = [];
  if (app.androidPackage && app.tracks && app.tracks.production)
    links.push(`<a class="store" href="https://play.google.com/store/apps/details?id=${esc(app.androidPackage)}" target="_blank" rel="noopener">Play ↗</a>`);
  if (app.iosUrl)
    links.push(`<a class="store" href="${esc(app.iosUrl)}" target="_blank" rel="noopener">App Store ↗</a>`);
  return `<td>${links.length ? `<div class="stores">${links.join('')}</div>` : '<span class="dash">—</span>'}</td>`;
}

function row(app) {
  const liveTracks = TRACK_ORDER.filter(t => app.tracks && app.tracks[t]);
  const off = liveTracks.length ? '' : 'off';
  const m = app.metrics || {};

  // App + dev columns are always shown; the four track columns vary.
  let trackCells;
  if (app.error) {
    trackCells = `<td class="trk" colspan="4"><span class="cell-err">${esc(app.error)}</span></td>`;
  } else if (!app.onPlay) {
    trackCells = `<td class="trk" colspan="4"><span class="cell-note">Not on Play (no published edit)</span></td>`;
  } else if (!liveTracks.length) {
    trackCells = `<td class="trk" colspan="4"><span class="cell-note">No releases on any track</span></td>`;
  } else {
    trackCells = TRACK_ORDER.map(t => trackCell(t, app.tracks && app.tracks[t], app.version)).join('');
  }

  return `<tr class="${off}">
    <td>
      <div class="app-name">${esc(app.displayName)}</div>
      <div class="app-id">${esc(app.androidPackage || app.appId)}</div>
    </td>
    <td class="num dev"><b>v${esc(app.version || '?')}</b></td>
    ${trackCells}
    ${iosCell(app)}
    ${num(m.activeInstalls)}
    ${money2(m.revenue)}
    ${storeCell(app)}
  </tr>`;
}

// ---- charts (dependency-free inline SVG) -----------------------------------
// Hex (not CSS vars): var() inside SVG presentation attributes isn't portable.
const CHART = { gold: '#C9A24A', ios: '#5B9BD5', ok: '#6FA86F', beta: '#6B8FB5' };
const SVG_W = 300, SVG_H = 96, PAD = { t: 8, r: 3, b: 5, l: 3 };

const niceMax = v => {
  if (!(v > 0)) return 1;
  const p = Math.pow(10, Math.floor(Math.log10(v))), n = v / p;
  return (n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10) * p;
};
const lastDefined = arr => { for (let i = arr.length - 1; i >= 0; i--) if (arr[i] != null) return arr[i]; return null; };
// Carry the last known value across gaps (and back-fill leading gaps). Used for
// "level" series like active installs, whose most recent days are null while
// Play's bulk export catches up (~3-day lag) — without this the line dives to 0.
function carryFwd(arr) {
  const out = arr.slice();
  let last = null;
  for (let i = 0; i < out.length; i++) { if (out[i] == null) out[i] = last; else last = out[i]; }
  const first = out.find(v => v != null) ?? 0;
  for (let i = 0; i < out.length && out[i] == null; i++) out[i] = first;
  return out;
}

// Stacked bars (two series, e.g. Android + iOS apps in production).
function stackedBars(days, a, b, colorA, colorB) {
  const n = days.length;
  const totals = days.map((_, i) => (a[i] || 0) + (b[i] || 0));
  const max = niceMax(Math.max(1, ...totals));
  const iw = SVG_W - PAD.l - PAD.r, ih = SVG_H - PAD.t - PAD.b;
  const step = iw / n, bw = step * 0.72;
  let bars = '';
  for (let i = 0; i < n; i++) {
    const x = PAD.l + step * i + (step - bw) / 2;
    const av = a[i] || 0, bv = b[i] || 0;
    const ah = ih * av / max, bh = ih * bv / max;
    const ay = PAD.t + ih - ah, by = ay - bh;
    if (av) bars += `<rect x="${x.toFixed(1)}" y="${ay.toFixed(1)}" width="${bw.toFixed(1)}" height="${ah.toFixed(1)}" fill="${colorA}"><title>${days[i]}: ${av} Android</title></rect>`;
    if (bv) bars += `<rect x="${x.toFixed(1)}" y="${by.toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" fill="${colorB}"><title>${days[i]}: ${bv} iOS</title></rect>`;
  }
  return `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" preserveAspectRatio="none">${bars}</svg>`;
}

// Filled area + line (e.g. revenue, active installs).
function areaLine(values, color, fmt) {
  const n = values.length;
  const vals = values.map(v => v || 0);
  const max = niceMax(Math.max(1, ...vals));
  const iw = SVG_W - PAD.l - PAD.r, ih = SVG_H - PAD.t - PAD.b;
  const X = i => PAD.l + (n <= 1 ? iw / 2 : iw * i / (n - 1));
  const Y = v => PAD.t + ih - ih * (v || 0) / max;
  const line = vals.map((v, i) => `${i ? 'L' : 'M'}${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(' ');
  const area = `M${X(0).toFixed(1)} ${(PAD.t + ih).toFixed(1)} ` +
    vals.map((v, i) => `L${X(i).toFixed(1)} ${Y(v).toFixed(1)}`).join(' ') +
    ` L${X(n - 1).toFixed(1)} ${(PAD.t + ih).toFixed(1)} Z`;
  const dots = vals.map((v, i) => `<circle cx="${X(i).toFixed(1)}" cy="${Y(v).toFixed(1)}" r="3" fill="transparent"><title>${values[i] == null ? '—' : (fmt ? fmt(values[i]) : values[i])}</title></circle>`).join('');
  return `<svg viewBox="0 0 ${SVG_W} ${SVG_H}" preserveAspectRatio="none">
    <path d="${area}" fill="${color}" opacity="0.12"/>
    <path d="${line}" fill="none" stroke="${color}" stroke-width="1.5" vector-effect="non-scaling-stroke" stroke-linejoin="round" stroke-linecap="round"/>
    ${dots}
  </svg>`;
}

const usd = v => '$' + Number(v).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

function renderCharts(series) {
  const host = document.getElementById('charts');
  if (!series || !series.days || !series.days.length) { host.style.display = 'none'; host.innerHTML = ''; return; }
  host.style.display = '';
  const days = series.days;
  const xr = `<div class="xr"><span>${days[0].slice(5)}</span><span>${days[days.length - 1].slice(5)}</span></div>`;

  const a = series.prodAndroid || [], b = series.prodIos || [];
  const lastA = lastDefined(a) || 0, lastB = lastDefined(b) || 0;
  const prodCard = `<div class="chartcard">
    <h3>Apps in production (30d)</h3>
    <div class="big">${lastA + lastB}<span class="unit">live · Android + iOS</span></div>
    ${stackedBars(days, a, b, CHART.gold, CHART.ios)}
    <div class="legend">
      <span class="k"><span class="sw" style="background:${CHART.gold}"></span>Android ${lastA}</span>
      <span class="k"><span class="sw" style="background:${CHART.ios}"></span>iOS ${lastB}</span>
    </div>
    ${xr}</div>`;

  const rev = series.revenue || [];
  const revTotal = rev.reduce((s, v) => s + (v || 0), 0);
  const revCard = `<div class="chartcard">
    <h3>Revenue (30d, Play)</h3>
    <div class="big">${usd(revTotal)}</div>
    ${areaLine(rev, CHART.ok, usd)}
    ${xr}</div>`;

  const ins = carryFwd(series.activeInstalls || []);
  const lastIns = lastDefined(ins) || 0;
  const insCard = `<div class="chartcard">
    <h3>Active installs (30d)</h3>
    <div class="big">${lastIns.toLocaleString()}</div>
    ${areaLine(ins, CHART.beta, v => v.toLocaleString())}
    ${xr}</div>`;

  host.innerHTML = prodCard + revCard + insCard;
}

async function load() {
  const rows = document.getElementById('rows');
  document.getElementById('snapshot').textContent = 'Loading…';
  try {
    const res = await fetch('/scratchpad/dashboard-data', { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const doc = await res.json();
    const apps = doc.apps || [];
    if (!apps.length) {
      document.getElementById('snapshot').textContent = 'No snapshot yet — run the collector.';
      rows.innerHTML = `<tr><td colspan="10"><div class="empty">No data. Run <code>node SEDX-site/collect-dashboard.js</code> on the laptop to populate this dashboard.</div></td></tr>`;
      document.getElementById('chips').innerHTML = '';
      renderCharts(null);
      return;
    }
    const s = doc.summary || {};
    const mx = doc.metrics || {};
    let snap = `Snapshot ${fmtAgo(doc.snapshotAt)} · ${new Date(doc.snapshotAt).toLocaleString()}`;
    if (mx.metricsAt) snap += `  ·  metrics ${fmtAgo(mx.metricsAt)}`;
    document.getElementById('snapshot').textContent = snap;

    let chips =
      `<span class="chip"><b>${s.total ?? apps.length}</b> apps</span>` +
      `<span class="chip"><b>${s.onProduction ?? 0}</b> on Play production</span>`;
    if (mx.summary?.onAppStore != null)
      chips += `<span class="chip"><b>${mx.summary.onAppStore}</b> on App Store</span>`;
    chips += `<span class="chip"><b>${s.onTesting ?? 0}</b> in testing</span>`;
    if (mx.summary?.totalActiveInstalls != null)
      chips += `<span class="chip"><b>${mx.summary.totalActiveInstalls.toLocaleString()}</b> active installs</span>`;
    if (mx.summary?.totalRevenue30d != null)
      chips += `<span class="chip"><b>$${mx.summary.totalRevenue30d.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</b> revenue (30d, Play)</span>`;
    document.getElementById('chips').innerHTML = chips;
    renderCharts(mx.series);

    // Production-first, then by name, so live apps sit at the top.
    const ord = a => (a.tracks && a.tracks.production ? 0 : a.onPlay ? 1 : 2);
    apps.sort((a, b) => ord(a) - ord(b) || String(a.displayName).localeCompare(b.displayName));
    rows.innerHTML = apps.map(row).join('');
  } catch (e) {
    document.getElementById('snapshot').textContent = 'Failed to load: ' + e.message;
  }
}

// Force rebuild: kick both cron Workers, then reload the fresh snapshot.
// Re-querying Play + App Store + GCS takes ~30s, so the button blocks meanwhile.
async function rebuild() {
  const btn = document.getElementById('rebuild');
  const snap = document.getElementById('snapshot');
  btn.disabled = true;
  const orig = btn.textContent;
  btn.textContent = 'Rebuilding…';
  snap.textContent = 'Rebuilding snapshot — re-querying Play + App Store (~30s)…';
  try {
    const res = await fetch('/scratchpad/dashboard-refresh', { method: 'POST' });
    const out = await res.json().catch(() => ({}));
    if (!res.ok || !out.ok) {
      const why = out.error || out.build?.error || out.metrics?.error || ('HTTP ' + res.status);
      snap.textContent = 'Rebuild failed: ' + why;
      return;
    }
    await load();
  } catch (e) {
    snap.textContent = 'Rebuild failed: ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = orig;
  }
}

document.getElementById('refresh').addEventListener('click', load);
document.getElementById('rebuild').addEventListener('click', rebuild);
load();
</script>
</body>
</html>
