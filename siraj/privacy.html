  hr { border:none; border-top:1px solid #2A2A22; margin:30px 0; }
  footer { color:#7A7158; font-size:13px; margin-top:40px; }

  [dir="rtl"] .brand { direction:rtl; }
  [dir="rtl"] h1, [dir="rtl"] h2 { text-align:right; }
</style>

    eff:'Quran &amp; Prayer · Last updated 25 June 2026',
    lead:'Siraj is a privacy-first Islamic app. There is <strong>no account, no advertising, no analytics SDK, and no tracking of any kind</strong>. The Quran text, translation, transliteration, tafsir commentary, prayer-time calculation, Qibla direction, duas, Tasbih, the 99 Names, the Hijri calendar, and the memorization (Hifz) tools all run entirely offline on your device.',
    s:[
      ['What we collect','Nothing about you is collected on a server, because we operate no server that receives your personal data. Siraj has no sign-in. The notes, bookmarks, highlights, memorization progress, and settings you create stay on your device and are removed when you uninstall the app.'],
      ['Location','Location (approximate, foreground-only) is requested for a single purpose: to calculate accurate prayer times and the Qibla direction for where you are. Your coordinates are used on your device and cached locally so the app keeps working offline; they are never uploaded to us or shared with anyone. Resolving a city name for display may use your device’s operating-system geocoder.'],
      ['Notifications','Notifications are requested only if you keep adhan (prayer-time) alerts enabled. They are scheduled locally on the device with no network round-trip.'],
      ['Audio recitation (the only optional online feature)','When you tap play on an ayah, the app streams that recitation from everyayah.com, a free public Quran-audio host; your request for that audio file goes to that host. No personal data is attached. All other content, including tafsir, is bundled in the app and needs no connection.'],
      ['The optional one-time “Study Tools” purchase','Siraj is free, with no subscriptions and no ads. A single optional one-time purchase unlocks the Study Tools (verse-by-verse tafsir, every reciter, and offline audio downloads). Payment is processed by Google Play or the Apple App Store billing system, and we use RevenueCat to validate and remember the unlock. RevenueCat receives only an anonymous app-generated identifier and your entitlement (unlocked or not) — not your name, your location, or anything you read or memorize in the app.'],
      ['Permissions','Siraj only requests a device permission when a feature you use requires it — location for prayer times and Qibla, and notifications for adhan alerts. Each is described above.'],
      ['Children’s privacy','Siraj is suitable for all ages and does not knowingly collect personal information from anyone, including children. There is no account and no user-generated content shared with others.'],
      ['Data security','Because your data never leaves your device, its security depends on your device’s own protections (screen lock, OS-level encryption). Any network requests Siraj makes (audio streaming, purchase validation) use HTTPS.'],
      ['Your choices','You control everything locally: turn notifications or location off in your device settings at any time, and uninstall the app to remove all locally stored data. Because we hold no personal data on a server, there is nothing for us to delete on your behalf.'],
      ['Changes','If this policy changes, the updated version will be posted at this address with a new “last updated” date.']
    ],
    footer:'© 2026 · Siraj — Quran &amp; Prayer. This policy covers the Siraj app only.'

      ['بچوں کی رازداری','سِراج ہر عمر کے لیے موزوں ہے اور کسی سے بھی، بشمول بچوں، جان بوجھ کر ذاتی معلومات جمع نہیں کرتا۔ نہ کوئی اکاؤنٹ ہے اور نہ صارف کا بنایا ہوا کوئی مواد دوسروں کے ساتھ شیئر ہوتا ہے۔'],
      ['ڈیٹا کی حفاظت','چونکہ آپ کا ڈیٹا کبھی آپ کے آلے سے باہر نہیں جاتا، اس کی حفاظت آپ کے اپنے آلے کے تحفظات (اسکرین لاک، آپریٹنگ سسٹم کی سطح کی خفیہ کاری) پر منحصر ہے۔ سِراج جو بھی نیٹ ورک درخواستیں کرتا ہے (آڈیو اسٹریمنگ، خریداری کی توثیق) وہ HTTPS استعمال کرتی ہیں۔'],
      ['آپ کے اختیارات','آپ ہر چیز کو مقامی طور پر کنٹرول کرتے ہیں: کسی بھی وقت اپنے آلے کی ترتیبات سے اطلاعات یا مقام بند کریں، اور تمام مقامی طور پر محفوظ ڈیٹا ہٹانے کے لیے ایپ ان انسٹال کریں۔ چونکہ ہم کسی سرور پر آپ کا ذاتی ڈیٹا نہیں رکھتے، اس لیے آپ کی طرف سے حذف کرنے کو ہمارے پاس کچھ نہیں۔'],
      ['تبدیلیاں','اگر یہ پالیسی تبدیل ہوتی ہے تو تازہ شدہ نسخہ نئی “آخری تازہ کاری” تاریخ کے ساتھ اسی پتے پر شائع کیا جائے گا۔']
    ],
    footer:'© 2026 · سِراج — قرآن و نماز۔ یہ پالیسی صرف سِراج ایپ پر لاگو ہوتی ہے۔'

  tr: {
    h1:'Gizlilik Politikası',
    eff:'Kur’an &amp; Namaz · Son güncelleme 25 Haziran 2026',
    lead:'Siraj, gizliliği önceleyen bir İslami uygulamadır. <strong>Hesap yok, reklam yok, analitik SDK yok ve hiçbir türde takip yok.</strong> Kur’an metni, meal, okunuş, tefsir, namaz vakti hesaplama, kıble yönü, dualar, Tesbih, 99 Esmaü’l-Hüsna, Hicri takvim ve ezberleme (Hıfz) araçlarının tümü cihazınızda tamamen çevrimdışı çalışır.',
    s:[
      ['Neyi topluyoruz','Hakkınızda hiçbir şey bir sunucuda toplanmaz, çünkü kişisel verilerinizi alan herhangi bir sunucu işletmiyoruz. Siraj’da oturum açma yoktur. Oluşturduğunuz notlar, yer imleri, vurgular, ezber ilerlemesi ve ayarlar cihazınızda kalır ve uygulamayı kaldırdığınızda silinir.'],
      ['Konum','Konum (yaklaşık, yalnızca uygulama açıkken) tek bir amaç için istenir: bulunduğunuz yere göre doğru namaz vakitlerini ve kıble yönünü hesaplamak. Koordinatlarınız cihazınızda kullanılır ve uygulama çevrimdışı çalışmaya devam etsin diye yerel olarak önbelleğe alınır; bunlar bize asla yüklenmez ya da kimseyle paylaşılmaz. Şehir adını göstermek için cihazınızın işletim sistemi coğrafi kodlayıcısı kullanılabilir.'],
      ['Bildirimler','Bildirimler yalnızca ezan (namaz vakti) uyarılarını etkin tutarsanız istenir. Cihazda yerel olarak, ağ bağlantısı olmadan zamanlanır.'],
      ['Sesli tilavet (tek isteğe bağlı çevrimiçi özellik)','Bir ayette oynat’a dokunduğunuzda uygulama o tilaveti, ücretsiz ve kamuya açık bir Kur’an ses sunucusu olan everyayah.com’dan akışla getirir; o ses dosyası isteğiniz bu sunucuya gider. Hiçbir kişisel veri eklenmez. Tefsir dahil diğer tüm içerik uygulamanın içinde gelir ve bağlantı gerektirmez.'],
      ['İsteğe bağlı tek seferlik “Çalışma Araçları” satın alımı','Siraj ücretsizdir; abonelik ve reklam yoktur. İsteğe bağlı tek seferlik tek bir satın alım Çalışma Araçları’nı açar (ayet ayet tefsir, tüm kariler ve çevrimdışı ses indirmeleri). Ödeme, Google Play veya Apple App Store faturalandırma sistemiyle işlenir ve satın almayı doğrulayıp hatırlamak için RevenueCat kullanırız. RevenueCat yalnızca uygulamanın oluşturduğu anonim bir tanımlayıcıyı ve hak durumunuzu (açık olup olmadığını) alır — adınızı, konumunuzu veya uygulamada okuduğunuz ya da ezberlediğiniz hiçbir şeyi değil.'],
      ['İzinler','Siraj, yalnızca kullandığınız bir özellik gerektirdiğinde cihaz izni ister — namaz vakitleri ve kıble için konum, ezan uyarıları için bildirimler. Her biri yukarıda açıklanmıştır.'],
      ['Çocukların gizliliği','Siraj her yaşa uygundur ve çocuklar dahil hiç kimseden bilerek kişisel bilgi toplamaz. Hesap yoktur ve başkalarıyla paylaşılan, kullanıcı tarafından oluşturulan içerik yoktur.'],
      ['Veri güvenliği','Verileriniz cihazınızdan asla çıkmadığı için güvenliği, cihazınızın kendi korumalarına (ekran kilidi, işletim sistemi düzeyinde şifreleme) bağlıdır. Siraj’ın yaptığı her ağ isteği (ses akışı, satın alma doğrulaması) HTTPS kullanır.'],
      ['Seçimleriniz','Her şeyi yerel olarak siz denetlersiniz: istediğiniz zaman cihaz ayarlarınızdan bildirimleri veya konumu kapatın ve yerel olarak depolanan tüm verileri kaldırmak için uygulamayı silin. Bir sunucuda kişisel verinizi tutmadığımız için sizin adınıza sileceğimiz bir şey yoktur.'],
      ['Değişiklikler','Bu politika değişirse, güncellenmiş sürüm yeni bir “son güncelleme” tarihiyle bu adreste yayımlanır.']
    ],
    footer:'© 2026 · Siraj — Kur’an &amp; Namaz. Bu politika yalnızca Siraj uygulamasını kapsar.'
  },

  fr: {
    h1:'Politique de confidentialité',
    eff:'Coran &amp; Prière · Dernière mise à jour le 25 juin 2026',
    lead:'Siraj est une application islamique qui place la confidentialité avant tout. <strong>Il n’y a aucun compte, aucune publicité, aucun SDK d’analyse et aucun suivi d’aucune sorte.</strong> Le texte du Coran, la traduction, la translittération, le tafsir, le calcul des heures de prière, la direction de la Qibla, les invocations, le Tasbih, les 99 noms, le calendrier hégirien et les outils de mémorisation (Hifz) fonctionnent tous entièrement hors ligne sur votre appareil.',
    s:[
      ['Ce que nous collectons','Rien vous concernant n’est collecté sur un serveur, car nous n’exploitons aucun serveur recevant vos données personnelles. Siraj n’a pas de connexion. Les notes, signets, surlignages, progrès de mémorisation et réglages que vous créez restent sur votre appareil et sont supprimés lorsque vous désinstallez l’application.'],
      ['Localisation','La localisation (approximative, au premier plan uniquement) est demandée dans un seul but : calculer des heures de prière précises et la direction de la Qibla selon l’endroit où vous êtes. Vos coordonnées sont utilisées sur votre appareil et mises en cache localement pour que l’application continue de fonctionner hors ligne ; elles ne nous sont jamais transmises ni partagées avec quiconque. L’affichage du nom d’une ville peut faire appel au géocodeur du système d’exploitation de votre appareil.'],
      ['Notifications','Les notifications ne sont demandées que si vous gardez activées les alertes d’adhan (heures de prière). Elles sont programmées localement sur l’appareil, sans aucun échange réseau.'],
      ['Récitation audio (la seule fonctionnalité en ligne facultative)','Lorsque vous appuyez sur lecture pour un verset, l’application diffuse cette récitation depuis everyayah.com, un hébergeur public et gratuit d’audio coranique ; votre demande de ce fichier audio est envoyée à cet hébergeur. Aucune donnée personnelle n’y est jointe. Tout le reste du contenu, y compris le tafsir, est intégré à l’application et ne nécessite aucune connexion.'],
      ['L’achat unique facultatif « Outils d’étude »','Siraj est gratuit, sans abonnement et sans publicité. Un seul achat unique facultatif débloque les Outils d’étude (tafsir verset par verset, tous les récitateurs et téléchargements audio hors ligne). Le paiement est traité par le système de facturation de Google Play ou de l’App Store d’Apple, et nous utilisons RevenueCat pour valider et mémoriser le déverrouillage. RevenueCat ne reçoit qu’un identifiant anonyme généré par l’application et votre droit d’accès (débloqué ou non) — ni votre nom, ni votre position, ni rien de ce que vous lisez ou mémorisez dans l’application.'],
      ['Autorisations','Siraj ne demande une autorisation de l’appareil que lorsqu’une fonctionnalité que vous utilisez l’exige — la localisation pour les heures de prière et la Qibla, et les notifications pour les alertes d’adhan. Chacune est décrite ci-dessus.'],
      ['Confidentialité des enfants','Siraj convient à tous les âges et ne collecte sciemment aucune information personnelle de quiconque, y compris des enfants. Il n’y a aucun compte ni aucun contenu créé par l’utilisateur partagé avec d’autres.'],
      ['Sécurité des données','Comme vos données ne quittent jamais votre appareil, leur sécurité dépend des protections de votre propre appareil (verrouillage de l’écran, chiffrement au niveau du système d’exploitation). Toutes les requêtes réseau effectuées par Siraj (diffusion audio, validation d’achat) utilisent HTTPS.'],
      ['Vos choix','Vous contrôlez tout localement : désactivez les notifications ou la localisation dans les réglages de votre appareil à tout moment, et désinstallez l’application pour supprimer toutes les données stockées localement. Comme nous ne détenons aucune donnée personnelle sur un serveur, nous n’avons rien à supprimer en votre nom.'],
      ['Modifications','Si cette politique change, la version mise à jour sera publiée à cette adresse avec une nouvelle date de « dernière mise à jour ».']
    ],
    footer:'© 2026 · Siraj — Coran &amp; Prière. Cette politique couvre uniquement l’application Siraj.'
  },

  bn: {
    h1:'গোপনীয়তা নীতি',
    eff:'কুরআন ও নামাজ · সর্বশেষ হালনাগাদ ২৫ জুন ২০২৬',
    lead:'সিরাজ একটি গোপনীয়তা-প্রথম ইসলামিক অ্যাপ। <strong>কোনো অ্যাকাউন্ট নেই, কোনো বিজ্ঞাপন নেই, কোনো অ্যানালিটিক্স SDK নেই, এবং কোনো ধরনের ট্র্যাকিং নেই।</strong> কুরআনের পাঠ, অনুবাদ, প্রতিবর্ণীকরণ, তাফসির, নামাজের সময় গণনা, কিবলার দিক, দোয়া, তাসবিহ, ৯৯টি নাম, হিজরি ক্যালেন্ডার এবং মুখস্থ (হিফজ) সরঞ্জাম—সবকিছুই আপনার ডিভাইসে সম্পূর্ণ অফলাইনে চলে।',
    s:[
      ['আমরা কী সংগ্রহ করি','আপনার সম্পর্কে কিছুই কোনো সার্ভারে সংগ্রহ করা হয় না, কারণ আপনার ব্যক্তিগত তথ্য গ্রহণ করে এমন কোনো সার্ভার আমরা চালাই না। সিরাজে কোনো সাইন-ইন নেই। আপনার তৈরি করা নোট, বুকমার্ক, হাইলাইট, মুখস্থের অগ্রগতি এবং সেটিংস আপনার ডিভাইসেই থাকে এবং অ্যাপ আনইনস্টল করলে মুছে যায়।'],
      ['অবস্থান','অবস্থান (আনুমানিক, শুধু অ্যাপ চালু থাকা অবস্থায়) একটিমাত্র উদ্দেশ্যে চাওয়া হয়: আপনি যেখানে আছেন সেখানকার সঠিক নামাজের সময় ও কিবলার দিক গণনা করা। আপনার স্থানাঙ্ক আপনার ডিভাইসে ব্যবহৃত হয় এবং স্থানীয়ভাবে সংরক্ষিত থাকে যাতে অ্যাপটি অফলাইনে কাজ করতে পারে; এগুলো কখনো আমাদের কাছে আপলোড করা হয় না বা কারও সাথে শেয়ার করা হয় না। শহরের নাম দেখানোর জন্য আপনার ডিভাইসের অপারেটিং সিস্টেমের জিওকোডার ব্যবহৃত হতে পারে।'],
      ['বিজ্ঞপ্তি','আপনি যদি আজান (নামাজের সময়) সতর্কতা সক্রিয় রাখেন কেবল তখনই বিজ্ঞপ্তির অনুমতি চাওয়া হয়। এগুলো কোনো নেটওয়ার্ক সংযোগ ছাড়াই ডিভাইসে স্থানীয়ভাবে নির্ধারিত হয়।'],
      ['তিলাওয়াত অডিও (একমাত্র ঐচ্ছিক অনলাইন বৈশিষ্ট্য)','আপনি কোনো আয়াতে প্লে চাপলে অ্যাপটি সেই তিলাওয়াত everyayah.com থেকে স্ট্রিম করে, যা একটি বিনামূল্যের সর্বজনীন কুরআন-অডিও হোস্ট; সেই অডিও ফাইলের জন্য আপনার অনুরোধ ওই হোস্টে যায়। কোনো ব্যক্তিগত তথ্য সংযুক্ত হয় না। তাফসিরসহ বাকি সব বিষয়বস্তু অ্যাপের ভেতরেই দেওয়া আছে এবং এর জন্য কোনো সংযোগ লাগে না।'],
      ['ঐচ্ছিক এককালীন “স্টাডি টুলস” ক্রয়','সিরাজ বিনামূল্যের, কোনো সাবস্ক্রিপশন বা বিজ্ঞাপন নেই। একটি ঐচ্ছিক এককালীন ক্রয় স্টাডি টুলস খুলে দেয় (আয়াত-ভিত্তিক তাফসির, সব ক্বারি, এবং অফলাইন অডিও ডাউনলোড)। পেমেন্ট Google Play বা Apple App Store-এর বিলিং সিস্টেমে প্রক্রিয়া করা হয়, এবং ক্রয় যাচাই ও মনে রাখার জন্য আমরা RevenueCat ব্যবহার করি। RevenueCat শুধু অ্যাপের তৈরি একটি বেনামি শনাক্তকারী এবং আপনার অধিকার (খোলা কি না) পায়—আপনার নাম, অবস্থান, বা অ্যাপে আপনি যা পড়েন বা মুখস্থ করেন তার কিছুই নয়।'],
      ['অনুমতি','আপনি ব্যবহার করছেন এমন কোনো বৈশিষ্ট্যের প্রয়োজন হলে কেবল তখনই সিরাজ ডিভাইসের অনুমতি চায়—নামাজের সময় ও কিবলার জন্য অবস্থান, এবং আজান সতর্কতার জন্য বিজ্ঞপ্তি। প্রতিটি উপরে বর্ণিত হয়েছে।'],
      ['শিশুদের গোপনীয়তা','সিরাজ সব বয়সের জন্য উপযোগী এবং শিশুসহ কারও কাছ থেকে জেনেশুনে ব্যক্তিগত তথ্য সংগ্রহ করে না। কোনো অ্যাকাউন্ট নেই এবং অন্যদের সাথে শেয়ার করা ব্যবহারকারী-তৈরি কোনো বিষয়বস্তু নেই।'],
      ['তথ্য নিরাপত্তা','যেহেতু আপনার তথ্য কখনো আপনার ডিভাইস ছেড়ে যায় না, এর নিরাপত্তা আপনার ডিভাইসের নিজস্ব সুরক্ষার (স্ক্রিন লক, অপারেটিং সিস্টেম-স্তরের এনক্রিপশন) উপর নির্ভর করে। সিরাজ যেসব নেটওয়ার্ক অনুরোধ করে (অডিও স্ট্রিমিং, ক্রয় যাচাই) সেগুলো HTTPS ব্যবহার করে।'],
      ['আপনার পছন্দ','আপনি সবকিছু স্থানীয়ভাবে নিয়ন্ত্রণ করেন: যেকোনো সময় আপনার ডিভাইস সেটিংসে বিজ্ঞপ্তি বা অবস্থান বন্ধ করুন, এবং স্থানীয়ভাবে সংরক্ষিত সব তথ্য মুছতে অ্যাপটি আনইনস্টল করুন। যেহেতু আমরা কোনো সার্ভারে আপনার ব্যক্তিগত তথ্য রাখি না, আপনার পক্ষে মুছে ফেলার মতো আমাদের কাছে কিছু নেই।'],

function render(lang){
  var d = DATA[lang];
  var rtl = !!RTL[lang];
  var html = '<div dir="' + (rtl ? 'rtl' : 'ltr') + '">';
  html += '<h1>' + d.h1 + '</h1>';
  html += '<p class="eff">' + d.eff + '</p>';
  html += '<p class="lead">' + d.lead + '</p>';
  for (var i = 0; i < d.s.length; i++){
    html += '<h2>' + d.s[i][0] + '</h2><p>' + d.s[i][1] + '</p>';
  }
  html += '<hr><footer>' + d.footer + '</footer>';
  html += '</div>';
  document.getElementById('doc').innerHTML = html;
  document.documentElement.lang = lang;
  document.documentElement.dir = rtl ? 'rtl' : 'ltr';

  var btns = document.querySelectorAll('#tabs button');
  for (var j = 0; j < btns.length; j++){
    btns[j].setAttribute('aria-selected', btns[j].dataset.lang === lang ? 'true' : 'false');
  }
  if (history.replaceState) history.replaceState(null, '', '#' + lang);
}

(function init(){
  var tabs = document.getElementById('tabs');
  for (var i = 0; i < ORDER.length; i++){
    (function(lang){
      var b = document.createElement('button');
      b.textContent = NATIVE[lang];
      b.dataset.lang = lang;
      b.setAttribute('role', 'tab');
      b.setAttribute('lang', lang);
      if (RTL[lang]) b.setAttribute('dir', 'rtl');
      b.onclick = function(){ render(lang); };
      tabs.appendChild(b);
    })(ORDER[i]);
  }
  var start = (location.hash || '').replace('#', '');
  if (!DATA[start]) start = 'en';
  render(start);
})();
</script>
